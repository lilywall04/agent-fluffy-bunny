<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Agent Fluffy Bunny</title>
  <link rel="icon" type="image/png" href="/Basicbunny.png" />
  <link rel="stylesheet" href="/src/style.css" />
</head>

<body>
  <div id="app" class="app-shell">
    <canvas id="matrixCanvas"></canvas>

    <div class="overlay">
      <div class="chat-ui" id="chatUI">
        <div id="chatLog" class="chat-log"></div>

        <div class="input-bar">
          <input
            id="msgInput"
            type="text"
            placeholder="Come in Agent Fluffy Bunny..."
          />
          <button id="sendBtn">Over</button>
        </div>
      </div>

      <div class="bunny-area">
        <img
          id="bunnyImg"
          src="/src/assets/Basicbunny.png"
          alt="Agent Fluffy Bunny"
          class="bunny-img"
        />
      </div>
    </div>
  </div>

  <script type="module" src="/src/main.js"></script>
</body>
</html>
