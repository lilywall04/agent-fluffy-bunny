<!doctype html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Agent Fluffy Bunny</title>
  <link rel="stylesheet" href="/src/style.css" />
</head>

<body>
  <div class="app">
    <!-- LEFT: Bunny Panel -->
    <section class="panel bunny-panel">
      <div class="bunny-card">
        <img id="bunnyImg" class="bunny-img" src="/src/assets/Basicbunny.png" alt="Bunny" />
        <div class="bunny-info">
          <div class="bunny-name">Agent Fluffy Bunny</div>
          <div id="bunnyStatus" class="bunny-status">Idle</div>
        </div>

        <div class="bunny-controls">
          <button id="wakeBtn" class="secondary">Wake</button>
          <button id="costumeBtn" class="secondary">Costume</button>
        </div>
      </div>
    </section>

    <!-- RIGHT: Chat Panel -->
    <section class="panel chat-panel">
      <div id="chatLog" class="chat-log"></div>

      <div class="chat-input">
        <button id="micBtn" class="secondary">🎤</button>
        <input id="msgInput" type="text" placeholder="Message Fluffy Bunny…" />
        <button id="sendBtn">Send</button>
      </div>
    </section>
  </div>

  <script type="module" src="/src/main.js"></script>
</body>

</html>
